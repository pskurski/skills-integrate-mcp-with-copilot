<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activity-controls" aria-label="Activity filters and sorting controls">
          <div class="control-group">
            <label for="search-activities">Search</label>
            <input
              type="text"
              id="search-activities"
              placeholder="Search by name, schedule, or description"
            />
          </div>
          <div class="control-group">
            <label for="filter-category">Category</label>
            <select id="filter-category">
              <option value="all">All categories</option>
            </select>
          </div>
          <div class="control-group">
            <label for="sort-activities">Sort by</label>
            <select id="sort-activities">
              <option value="name">Name (A-Z)</option>
              <option value="time">Time (earliest first)</option>
              <option value="spots">Available spots (most first)</option>
            </select>
          </div>
        </div>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
